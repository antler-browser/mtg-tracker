<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.webp" />
    <link rel="local-first-auth-manifest" href="/local-first-auth-manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Commander Battle Log</title>
    <script>
      // Dynamically generate Smart App Banner with current page URL
      (function() {
        // Get current page URL
        const currentUrl = window.location.href;

        // URL-encode the current URL
        const encodedUrl = encodeURIComponent(currentUrl);

        // Create meta tag
        const meta = document.createElement('meta');
        meta.name = 'apple-itunes-app';
        meta.content = `app-id=6753969350, app-argument=https://antlerbrowser.com/open/${encodedUrl}`;

        // Add to head
        document.head.appendChild(meta);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
